<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Club</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid #eee; }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { font-size: 13px; color: #666; text-decoration: none; cursor: pointer; }
    .nav-btn { font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
    .hero { padding: 3rem 1.5rem 2rem; text-align: center; }
    .hero-tag { display: inline-block; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; background: #EEEDFE; color: #3C3489; margin-bottom: 1rem; }
    .hero h1 { font-size: 32px; font-weight: 600; line-height: 1.25; margin-bottom: 0.75rem; }
    .hero p { font-size: 15px; color: #666; max-width: 380px; margin: 0 auto 1.5rem; }
    .hero-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-primary { font-size: 14px; font-weight: 500; padding: 9px 22px; border-radius: 8px; background: #534AB7; color: #fff; border: none; cursor: pointer; }
    .btn-outline { font-size: 14px; padding: 9px 22px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; }
    .section { padding: 2rem 1.5rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-title { font-size: 17px; font-weight: 600; }
    .month-nav { display: flex; align-items: center; gap: 12px; }
    .month-nav button { width: 28px; height: 28px; border-radius: 8px; border: 1px solid #eee; background: transparent; color: #666; cursor: pointer; font-size: 14px; }
    .month-nav span { font-size: 14px; font-weight: 500; min-width: 90px; text-align: center; }
    .calendar { border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid #eee; }
    .cal-weekday { font-size: 11px; font-weight: 500; color: #999; text-align: center; padding: 10px 0; letter-spacing: 0.06em; text-transform: uppercase; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-day { min-height: 72px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; padding: 8px 6px; cursor: pointer; }
    .cal-day:nth-child(7n) { border-right: none; }
    .cal-day:hover { background: #f9f9f9; }
    .cal-day.other-month .day-num { color: #ccc; }
    .cal-day.today .day-num { background: #534AB7; color: #fff; border-radius: 50%; }
    .day-num { font-size: 12px; font-weight: 500; margin-bottom: 4px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .event-dot { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #EEEDFE; color: #3C3489; }
    .event-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .event-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1rem; cursor: pointer; transition: border-color 0.15s; }
    .event-card:hover { border-color: #aaa; }
    .event-card-img { height: 120px; border-radius: 8px; margin-bottom: 10px; background: #EEEDFE; display: flex; align-items: center; justify-content: center; font-size: 36px; overflow: hidden; }
    .event-card-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
    .event-card-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 6px; background: #EEEDFE; color: #3C3489; }
    .event-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .event-card-meta { font-size: 12px; color: #666; }
    .event-card-footer { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .spots { font-size: 12px; color: #666; }
    .reg-btn { font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 8px; background: #534AB7; color: #fff; border: none; cursor: pointer; text-decoration: none; }
    .loading { text-align: center; padding: 2rem; color: #999; font-size: 14px; }
    .footer { margin-top: 2.5rem; padding: 1.5rem; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .footer-text { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>

<div class="nav">
  <div class="logo">Social Club</div>
  <div class="nav-links">
    <a href="#events">Events</a>
    <a href="#about">About</a>
  </div>
  <button class="nav-btn">Join club</button>
</div>

<div class="hero">
  <div class="hero-tag">Moscow · Est. 2023</div>
  <h1>Your community,<br>your calendar</h1>
  <p>Discover events, meet people, and make every week memorable.</p>
  <div class="hero-actions">
    <button class="btn-primary" onclick="document.getElementById('events').scrollIntoView({behavior:'smooth'})">Browse events</button>
    <button class="btn-outline">Learn more</button>
  </div>
</div>

<div class="section" id="calendar-section">
  <div class="section-header">
    <div class="section-title" id="cal-title">Loading...</div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8592;</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">&#8594;</button>
    </div>
  </div>
  <div class="calendar">
    <div class="cal-weekdays">
      <div class="cal-weekday">Mon</div><div class="cal-weekday">Tue</div>
      <div class="cal-weekday">Wed</div><div class="cal-weekday">Thu</div>
      <div class="cal-weekday">Fri</div><div class="cal-weekday">Sat</div>
      <div class="cal-weekday">Sun</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<div class="section" id="events">
  <div class="section-header">
    <div class="section-title">Upcoming events</div>
  </div>
  <div id="events-container" class="loading">Loading events...</div>
</div>

<div class="footer">
  <div class="footer-text">© 2026 Social Club</div>
  <div class="footer-text">Powered by Notion</div>
</div>

<script>
  let allEvents = [];
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth();

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  async function loadEvents() {
    try {
      const res = await fetch('/api/events');
      allEvents = await res.json();
      renderCalendar();
      renderCards();
    } catch (e) {
      document.getElementById('events-container').innerHTML = '<p style="color:#999;font-size:14px;">Could not load events.</p>';
    }
  }

  function renderCalendar() {
    const label = MONTHS[currentMonth] + ' ' + currentYear;
    document.getElementById('cal-title').textContent = label;
    document.getElementById('month-label').textContent = label;

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevDays = new Date(currentYear, currentMonth, 0).getDate();
    const today = new Date();

    const monthEvents = {};
    allEvents.forEach(ev => {
      if (!ev.date) return;
      const d = new Date(ev.date);
      if (d.getFullYear() === currentYear && d.getMonth() === currentMonth) {
        const day = d.getDate();
        if (!monthEvents[day]) monthEvents[day] = [];
        monthEvents[day].push(ev);
      }
    });

    for (let i = 0; i < offset; i++) {
      const d = document.createElement('div');
      d.className = 'cal-day other-month';
      d.innerHTML = `<div class="day-num">${prevDays - offset + 1 + i}</div>`;
      grid.appendChild(d);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isToday = today.getDate() === d && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
      cell.className = 'cal-day' + (isToday ? ' today' : '');
      cell.innerHTML = `<div class="day-num">${d}</div>`;
      if (monthEvents[d]) {
        monthEvents[d].forEach(ev => {
          const dot = document.createElement('div');
          dot.className = 'event-dot';
          dot.textContent = ev.name;
          cell.appendChild(dot);
        });
      }
      grid.appendChild(cell);
    }

    const remaining = (offset + daysInMonth) % 7;
    if (remaining > 0) {
      for (let i = 1; i <= 7 - remaining; i++) {
        const d = document.createElement('div');
        d.className = 'cal-day other-month';
        d.innerHTML = `<div class="day-num">${i}</div>`;
        grid.appendChild(d);
      }
    }
  }

  function renderCards() {
    const container = document.getElementById('events-container');
    const now = new Date();
    const upcoming = allEvents
      .filter(ev => ev.date && new Date(ev.date) >= now)
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    if (upcoming.length === 0) {
      container.innerHTML = '<p style="color:#999;font-size:14px;">No upcoming events.</p>';
      return;
    }

    container.className = 'event-cards';
    container.innerHTML = upcoming.map(ev => {
      const date = new Date(ev.date);
      const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const imgContent = ev.image
        ? `<img src="${ev.image}" alt="${ev.name}" />`
        : '🎉';
      const registerLink = ev.register || '#';
      return `
        <div class="event-card">
          <div class="event-card-img">${imgContent}</div>
          ${ev.city ? `<span class="event-card-tag">${ev.city}</span>` : ''}
          <h3>${ev.name}</h3>
          <div class="event-card-meta">${dateStr}${ev.city ? ' · ' + ev.city : ''}</div>
          <div class="event-card-footer">
            <span class="spots">${ev.spots ? ev.spots + ' spots left' : ''}</span>
            <a class="reg-btn" href="${registerLink}" target="_blank">Register</a>
          </div>
        </div>`;
    }).join('');
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  loadEvents();
</script>
</body>
</html>
